name: Descubrir productos AEG

on:
  schedule:
    - cron: "0 3 * * 1" # todos los lunes a las 03:00 UTC
  workflow_dispatch: {} # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ejecutar descubrimiento
        run: python discover_products.py

      - name: Guardar catálogo actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json
          git diff --staged --quiet || git commit -m "Actualizar catálogo de productos"
          git push
